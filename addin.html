<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        #passenger-report-addin { padding: 20px; font-family: sans-serif; background: #f5f6fa; }
        .filter-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 20px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .date-group { display: flex; flex-direction: column; }
        .card-container { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .card { flex: 1; min-width: 200px; color: white; padding: 20px; border-radius: 10px; }
        .table-wrapper { background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: auto; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead { background: #2f3640; color: white; position: sticky; top: 0; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; color: white; font-weight: bold; }
        button { background: #0984e3; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;}
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div id="passenger-report-addin">
        <h2>📊 Monitor de Ocupación de Flota</h2>
        
        <div class="filter-container">
            <div class="date-group">
                <label style="font-size: 12px; font-weight: bold; margin-bottom: 5px;">Desde:</label>
                <input type="date" id="date-from" style="padding: 8px; border: 1px solid #dcdde1; border-radius: 4px;">
            </div>
            <div class="date-group">
                <label style="font-size: 12px; font-weight: bold; margin-bottom: 5px;">Hasta:</label>
                <input type="date" id="date-to" style="padding: 8px; border: 1px solid #dcdde1; border-radius: 4px;">
            </div>
            <button id="btn-refresh">Generar Informe</button>
            <button id="btn-download" style="background: #27ae60; display:none;">📥 Descargar Excel</button>
        </div>

        <div id="summary-cards" class="card-container"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Vehículo</th>
                        <th>Estado</th>
                        <th>Inicio Viaje</th>
                        <th>Duración</th>
                        <th>Distancia (km)</th>
                    </tr>
                </thead>
                <tbody id="results-table-body">
                    <tr><td colspan="5" style="text-align: center; padding: 20px; color: #7f8c8d;">Selecciona un rango de fechas y haz clic en "Generar Informe"...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        geotab.addin.passengerReport = function (api, state) {
            const RULE_ID = "aDvSGnsFqwU6HY0-rtpPgkA";
            let lastData = [];

            // Envoltorio Promise para la API nativa de Geotab
            const callAPI = (method, params) => {
                return new Promise((resolve, reject) => {
                    api.call(method, params, resolve, reject);
                });
            };

            const processData = async (fromDateStr, toDateStr) => {
                const fromDate = new Date(fromDateStr).toISOString();
                
                // Ajustamos la fecha "Hasta" para que incluya hasta las 23:59:59 de ese día
                const toDateObj = new Date(toDateStr);
                toDateObj.setHours(23, 59, 59, 999);
                const toDate = toDateObj.toISOString();

                try {
                    // Llamadas a la API usando el envoltorio Promise
                    const [devices, trips, exceptions] = await Promise.all([
                        callAPI("Get", { typeName: "Device" }),
                        callAPI("Get", { typeName: "Trip", search: { fromDate, toDate } }),
                        callAPI("Get", { typeName: "ExceptionEvent", search: { ruleSearch: { id: RULE_ID }, fromDate, toDate } })
                    ]);

                    const report = [];
                    
                    devices.forEach(dev => {
                        // Filtramos y ordenamos los viajes cronológicamente
                        const devTrips = trips.filter(t => t.device.id === dev.id).sort((a,b) => new Date(a.start) - new Date(b.start));
                        const devExcep = exceptions.filter(e => e.device.id === dev.id);
                        
                        let isOccupied = false;

                        devTrips.forEach(trip => {
                            // Buscamos si hubo apertura de puerta en los 5 minutos previos o durante el inicio
                            const hasEvent = devExcep.some(e => 
                                new Date(e.activeFrom) >= new Date(new Date(trip.start).getTime() - 300000) && 
                                new Date(e.activeFrom) <= new Date(trip.start)
                            );
                            
                            // Si detecta el evento, cambia el estado (Toggle)
                            if (hasEvent) isOccupied = !isOccupied;

                            report.push({
                                vehicle: dev.name,
                                occupied: isOccupied,
                                start: new Date(trip.start).toLocaleString(),
                                duration: Math.round((new Date(trip.stop) - new Date(trip.start)) / 60000),
                                distance: (trip.distance / 1000).toFixed(2)
                            });
                        });
                    });
                    
                    // Ordenar el informe final alfabéticamente por vehículo y luego por fecha
                    return report.sort((a, b) => {
                        if (a.vehicle === b.vehicle) return new Date(a.start) - new Date(b.start);
                        return a.vehicle.localeCompare(b.vehicle);
                    });

                } catch (err) { 
                    alert("Error obteniendo datos: " + err.message); 
                    return []; 
                }
            };

            const render = (data) => {
                const tbody = document.getElementById("results-table-body");
                const summary = document.getElementById("summary-cards");
                let counts = { occ: 0, emp: 0, dOcc: 0, dEmp: 0 };

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;">No se encontraron viajes para este periodo.</td></tr>';
                    summary.innerHTML = '';
                    document.getElementById("btn-download").style.display = "none";
                    return;
                }

                tbody.innerHTML = data.map(row => {
                    if (row.occupied) { counts.occ++; counts.dOcc += parseFloat(row.distance); }
                    else { counts.emp++; counts.dEmp += parseFloat(row.distance); }
                    
                    return `<tr>
                        <td><strong>${row.vehicle}</strong></td>
                        <td><span class="badge" style="background:${row.occupied ? '#27ae60' : '#7f8c8d'}">${row.occupied ? '👥 OCUPADO' : '⚪ VACÍO'}</span></td>
                        <td>${row.start}</td>
                        <td>${row.duration} min</td>
                        <td>${row.distance} km</td>
                    </tr>`;
                }).join('');

                summary.innerHTML = `
                    <div class="card" style="background:#27ae60">
                        <h4 style="margin-top:0;">Viajes con Pasajeros</h4>
                        <p style="font-size:24px; font-weight:bold; margin:0;">${counts.occ} <span style="font-size:14px; font-weight:normal;">viajes</span></p>
                        <p style="margin:5px 0 0 0; font-size:14px;">Total: ${counts.dOcc.toFixed(1)} km</p>
                    </div>
                    <div class="card" style="background:#7f8c8d">
                        <h4 style="margin-top:0;">Viajes en Vacío</h4>
                        <p style="font-size:24px; font-weight:bold; margin:0;">${counts.emp} <span style="font-size:14px; font-weight:normal;">viajes</span></p>
                        <p style="margin:5px 0 0 0; font-size:14px;">Total: ${counts.dEmp.toFixed(1)} km</p>
                    </div>
                `;
                document.getElementById("btn-download").style.display = "block";
            };

            return {
                initialize: function (api, state, callback) { 
                    // Pre-seleccionar la fecha de hoy en ambos campos
                    const today = new Date().toISOString().split('T')[0];
                    document.getElementById("date-from").value = today;
                    document.getElementById("date-to").value = today;
                    callback(); 
                },
                focus: function (api, state) {
                    document.getElementById("btn-refresh").onclick = async () => {
                        const dateFrom = document.getElementById("date-from").value;
                        const dateTo = document.getElementById("date-to").value;
                        
                        if (!dateFrom || !dateTo) return alert("Por favor, selecciona las fechas Desde y Hasta.");
                        if (new Date(dateFrom) > new Date(dateTo)) return alert("La fecha 'Desde' no puede ser posterior a 'Hasta'.");

                        const btn = document.getElementById("btn-refresh");
                        btn.innerText = "Cargando...";
                        btn.disabled = true;

                        lastData = await processData(dateFrom, dateTo);
                        render(lastData);

                        btn.innerText = "Generar Informe";
                        btn.disabled = false;
                    };

                    document.getElementById("btn-download").onclick = () => {
                        let csv = "\uFEFFVehiculo,Estado,Inicio,Duracion(min),Distancia(km)\n" + 
                                  lastData.map(r => `${r.vehicle},${r.occupied?'Ocupado':'Vacio'},${r.start},${r.duration},${r.distance}`).join("\n");
                        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                        const link = document.createElement("a");
                        link.href = URL.createObjectURL(blob);
                        link.download = `informe_pasajeros_${document.getElementById("date-from").value}_al_${document.getElementById("date-to").value}.csv`;
                        link.click();
                    };
                },
                blur: function () {}
            };
        };
    </script>
</body>
</html>
