<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        #passenger-report-addin { padding: 20px; font-family: sans-serif; background: #f5f6fa; }
        .filter-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 20px; align-items: flex-end; margin-bottom: 20px; }
        .card-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; color: white; padding: 20px; border-radius: 10px; }
        .table-wrapper { background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead { background: #2f3640; color: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="passenger-report-addin">
        <h2>📊 Monitor de Ocupación de Flota</h2>
        
        <div class="filter-container">
            <div>
                <label style="display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px;">Fecha:</label>
                <input type="date" id="date-selector" style="padding: 8px; border: 1px solid #dcdde1; border-radius: 4px;">
            </div>
            <button id="btn-refresh" style="background: #0984e3; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Generar Informe</button>
            <button id="btn-download" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; display:none;">📥 Excel</button>
        </div>

        <div id="summary-cards" class="card-container"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Vehículo</th>
                        <th>Estado</th>
                        <th>Inicio Viaje</th>
                        <th>Duración</th>
                        <th>Distancia (km)</th>
                    </tr>
                </thead>
                <tbody id="results-table-body">
                    <tr><td colspan="5" style="text-align: center;">Selecciona una fecha...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        geotab.addin.passengerReport = function (api, state) {
            const RULE_ID = "aDvSGnsFqwU6HY0-rtpPgkA";
            let lastData = [];

            const processData = async (date) => {
                const fromDate = new Date(date).toISOString();
                const toDate = new Date(new Date(date).setDate(new Date(date).getDate() + 1)).toISOString();

                try {
                    const [devices, trips, exceptions] = await Promise.all([
                        api.asyncCall("Get", { typeName: "Device" }),
                        api.asyncCall("Get", { typeName: "Trip", search: { fromDate, toDate } }),
                        api.asyncCall("Get", { typeName: "ExceptionEvent", search: { ruleSearch: { id: RULE_ID }, fromDate, toDate } })
                    ]);

                    const report = [];
                    devices.forEach(dev => {
                        const devTrips = trips.filter(t => t.device.id === dev.id).sort((a,b) => new Date(a.start) - new Date(b.start));
                        const devExcep = exceptions.filter(e => e.device.id === dev.id);
                        let isOccupied = false;

                        devTrips.forEach(trip => {
                            const hasEvent = devExcep.some(e => 
                                new Date(e.activeFrom) >= new Date(new Date(trip.start).getTime() - 300000) && 
                                new Date(e.activeFrom) <= new Date(trip.start)
                            );
                            if (hasEvent) isOccupied = !isOccupied;

                            report.push({
                                vehicle: dev.name,
                                occupied: isOccupied,
                                start: new Date(trip.start).toLocaleTimeString(),
                                duration: Math.round((new Date(trip.stop) - new Date(trip.start)) / 60000),
                                distance: (trip.distance / 1000).toFixed(2)
                            });
                        });
                    });
                    return report;
                } catch (err) { alert("Error API: " + err); return []; }
            };

            const render = (data) => {
                const tbody = document.getElementById("results-table-body");
                const summary = document.getElementById("summary-cards");
                let counts = { occ: 0, emp: 0, dOcc: 0, dEmp: 0 };

                tbody.innerHTML = data.map(row => {
                    if (row.occupied) { counts.occ++; counts.dOcc += parseFloat(row.distance); }
                    else { counts.emp++; counts.dEmp += parseFloat(row.distance); }
                    
                    return `<tr>
                        <td>${row.vehicle}</td>
                        <td><span class="badge" style="background:${row.occupied ? '#27ae60' : '#7f8c8d'}">${row.occupied ? '👥 OCUPADO' : '⚪ VACÍO'}</span></td>
                        <td>${row.start}</td>
                        <td>${row.duration} min</td>
                        <td>${row.distance} km</td>
                    </tr>`;
                }).join('');

                summary.innerHTML = `
                    <div class="card" style="background:#27ae60"><h4>Ocupado: ${counts.occ} viajes</h4><p>${counts.dOcc.toFixed(1)} km</p></div>
                    <div class="card" style="background:#7f8c8d"><h4>Vacío: ${counts.emp} viajes</h4><p>${counts.dEmp.toFixed(1)} km</p></div>
                `;
                document.getElementById("btn-download").style.display = "block";
            };

            return {
                initialize: function (api, state, callback) { callback(); },
                focus: function (api, state) {
                    document.getElementById("btn-refresh").onclick = async () => {
                        const date = document.getElementById("date-selector").value;
                        if (!date) return;
                        lastData = await processData(date);
                        render(lastData);
                    };
                    document.getElementById("btn-download").onclick = () => {
                        let csv = "\uFEFFVehiculo,Estado,Inicio,Duracion,Distancia\n" + 
                                  lastData.map(r => `${r.vehicle},${r.occupied?'Ocupado':'Vacio'},${r.start},${r.duration},${r.distance}`).join("\n");
                        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                        const link = document.createElement("a");
                        link.href = URL.createObjectURL(blob);
                        link.download = "informe_pasajeros.csv";
                        link.click();
                    };
                },
                blur: function () {}
            };
        };
    </script>
</body>
</html>
