<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        #passenger-report-addin { padding: 20px; font-family: sans-serif; background: #f5f6fa; }
        .filter-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 20px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .date-group { display: flex; flex-direction: column; }
        .card-container-summary { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .card-summary { flex: 1; min-width: 200px; color: white; padding: 20px; border-radius: 10px; }
        
        /* NUEVO DISEÑO DE TARJETAS POR VEHÍCULO */
        #results-cards-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: flex-start; }
        .vehicle-card { background: white; border-radius: 12px; padding: 20px; width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: 1px solid #d1d8e0; font-size: 13px;}
        .vehicle-card h3 { margin: 0 0 10px 0; color: #2f3640; border-bottom: 2px solid #0984e3; padding-bottom: 5px; font-size: 16px;}
        .card-section { margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        .card-section-title { font-weight: bold; color: #7f8c8d; margin-bottom: 5px; display: block;}
        .data-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .data-label { color: #636e72; }
        .data-value { font-weight: bold; }
        .total-viajes { font-size: 18px; font-weight: bold; margin-bottom: 10px; display: block; }
        
        /* Estilos generales */
        button { background: #0984e3; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="passenger-report-addin">
        <h2>📊 Monitor de Ocupación de Flota</h2>
        
        <div class="filter-container">
            <div class="date-group">
                <label style="font-size: 12px; font-weight: bold; margin-bottom: 5px;">Desde:</label>
                <input type="date" id="date-from" style="padding: 8px; border: 1px solid #dcdde1; border-radius: 4px;">
            </div>
            <div class="date-group">
                <label style="font-size: 12px; font-weight: bold; margin-bottom: 5px;">Hasta:</label>
                <input type="date" id="date-to" style="padding: 8px; border: 1px solid #dcdde1; border-radius: 4px;">
            </div>
            <button id="btn-refresh">Generar Informe</button>
            <button id="btn-download" style="background: #27ae60; display:none;">📥 Descargar Excel</button>
        </div>

        <div id="summary-cards" class="card-container-summary"></div>

        <div id="results-cards-container">
            <p style="text-align: center; padding: 20px; color: #7f8c8d; width: 100%;">Selecciona un rango de fechas y haz clic en "Generar Informe"...</p>
        </div>
    </div>

    <script>
        geotab.addin.passengerReport = function (api, state) {
            const RULE_ID = "aDvSGnsFqwU6HY0-rtpPgkA";
            let lastData = [];

            // Envoltorio Promise para la API nativa de Geotab
            const callAPI = (method, params) => {
                return new Promise((resolve, reject) => {
                    api.call(method, params, resolve, reject);
                });
            };

            const processData = async (fromDateStr, toDateStr) => {
                const fromDate = new Date(fromDateStr).toISOString();
                const toDateObj = new Date(toDateStr);
                toDateObj.setHours(23, 59, 59, 999);
                const toDate = toDateObj.toISOString();

                try {
                    // Llamadas a la API usando el envoltorio Promise
                    const [devices, trips, exceptions] = await Promise.all([
                        callAPI("Get", { typeName: "Device" }),
                        callAPI("Get", { typeName: "Trip", search: { fromDate, toDate } }),
                        callAPI("Get", { typeName: "ExceptionEvent", search: { ruleSearch: { id: RULE_ID }, fromDate, toDate } })
                    ]);

                    const report = [];
                    
                    devices.forEach(dev => {
                        // Filtramos y ordenamos los viajes cronológicamente para el cálculo de tiempo parado
                        const devTrips = trips.filter(t => t.device.id === dev.id).sort((a,b) => new Date(a.start) - new Date(b.start));
                        const devExcep = exceptions.filter(e => e.device.id === dev.id);
                        
                        let isOccupied = false;
                        let lastTripStop = null;

                        // Agregadores por vehículo
                        let vehStats = {
                            vehicleName: dev.name,
                            totCount: 0,
                            occCount: 0,
                            empCount: 0,
                            totDist: 0,
                            occDist: 0,
                            empDist: 0,
                            totTimeMs: 0,
                            occTimeMs: 0,
                            empTimeMs: 0,
                            stoppedTimeMs: 0
                        };

                        devTrips.forEach(trip => {
                            const tripStart = new Date(trip.start);
                            const tripStop = new Date(trip.stop);
                            const tripDurationMs = tripStop - tripStart;

                            // Cálculo de tiempo parado: tiempo entre el fin del viaje anterior y el inicio de este
                            if (lastTripStop) {
                                vehStats.stoppedTimeMs += (tripStart - lastTripStop);
                            }
                            lastTripStop = tripStop;

                            // Buscamos si hubo apertura de puerta en los 5 minutos previos o durante el inicio
                            const hasEvent = devExcep.some(e => 
                                new Date(e.activeFrom) >= new Date(tripStart.getTime() - 300000) && 
                                new Date(e.activeFrom) <= tripStart
                            );
                            
                            // Si detecta el evento, cambia el estado (Toggle)
                            if (hasEvent) isOccupied = !isOccupied;

                            const tripDistKm = trip.distance / 1000;

                            // Actualizar estadísticas
                            vehStats.totCount++;
                            vehStats.totDist += tripDistKm;
                            vehStats.totTimeMs += tripDurationMs;

                            if (isOccupied) {
                                vehStats.occCount++;
                                vehStats.occDist += tripDistKm;
                                vehStats.occTimeMs += tripDurationMs;
                            } else {
                                vehStats.empCount++;
                                vehStats.empDist += tripDistKm;
                                vehStats.empTimeMs += tripDurationMs;
                            }
                        });

                        // Solo añadimos el vehículo si ha tenido algún viaje
                        if (vehStats.totCount > 0) {
                            report.push(vehStats);
                        }
                    });
                    
                    // Ordenar el informe final alfabéticamente por vehículo
                    return report.sort((a, b) => a.vehicleName.localeCompare(b.vehicleName));

                } catch (err) { 
                    alert("Error obteniendo datos: " + err.message); 
                    return []; 
                }
            };

            // Función auxiliar para formatear tiempo (ms a HH:MM)
            const formatTime = (ms) => {
                if (ms <= 0) return "0 min";
                const totalMinutes = Math.round(ms / 60000);
                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;
                return (hours > 0 ? `${hours}h ` : "") + `${minutes} min`;
            };

            const render = (data) => {
                const summary = document.getElementById("summary-cards");
                const resultsContainer = document.getElementById("results-cards-container");
                
                let counts = { occ: 0, emp: 0, dOcc: 0, dEmp: 0, tOccMs: 0, tEmpMs: 0 };

                if (data.length === 0) {
                    summary.innerHTML = '';
                    resultsContainer.innerHTML = '<p style="text-align: center; padding: 20px; width: 100%;">No se encontraron viajes para este periodo.</p>';
                    document.getElementById("btn-download").style.display = "none";
                    return;
                }

                // Generar tarjetas de vehículos
                resultsContainer.innerHTML = data.map(v => {
                    // Acumular para el resumen global
                    counts.occ += v.occCount; counts.emp += v.empCount;
                    counts.dOcc += v.occDist; counts.dEmp += v.empDist;
                    counts.tOccMs += v.occTimeMs; counts.tEmpMs += v.empTimeMs;

                    return `
                        <div class="vehicle-card">
                            <h3>${v.vehicleName}</h3>
                            <span class="total-viajes">${v.totCount} <span style="font-weight:normal; font-size:14px;">viajes</span></span>
                            
                            <div class="card-section">
                                <span class="card-section-title">Ocupación (👥 OCUPADO)</span>
                                <div class="data-row"><span class="data-label">Viajes:</span><span class="data-value">${v.occCount}</span></div>
                                <div class="data-row"><span class="data-label">Distancia:</span><span class="data-value">${v.occDist.toFixed(1)} km</span></div>
                                <div class="data-row"><span class="data-label">Tiempo Conduc.:</span><span class="data-value">${formatTime(v.occTimeMs)}</span></div>
                            </div>
                            
                            <div class="card-section">
                                <span class="card-section-title">Ocupación (⚪ VACÍO)</span>
                                <div class="data-row"><span class="data-label">Viajes:</span><span class="data-value">${v.empCount}</span></div>
                                <div class="data-row"><span class="data-label">Distancia:</span><span class="data-value">${v.empDist.toFixed(1)} km</span></div>
                                <div class="data-row"><span class="data-label">Tiempo Conduc.:</span><span class="data-value">${formatTime(v.empTimeMs)}</span></div>
                            </div>

                            <div class="card-section">
                                <span class="card-section-title">Tiempos Totales</span>
                                <div class="data-row"><span class="data-label">Tiempo en Conducción:</span><span class="data-value">${formatTime(v.totTimeMs)}</span></div>
                                <div class="data-row"><span class="data-label">Tiempo Parado (entre viajes):</span><span class="data-value">${formatTime(v.stoppedTimeMs)}</span></div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Generar tarjetas de resumen global
                summary.innerHTML = `
                    <div class="card-summary" style="background:#27ae60">
                        <h4 style="margin-top:0;">Global: Viajes Ocupados</h4>
                        <p style="font-size:24px; font-weight:bold; margin:0;">${counts.occ} viajes</p>
                        <p style="margin:5px 0 0 0; font-size:14px;">Total: ${counts.dOcc.toFixed(1)} km | ${formatTime(counts.tOccMs)}</p>
                    </div>
                    <div class="card-summary" style="background:#7f8c8d">
                        <h4 style="margin-top:0;">Global: Viajes Vacío</h4>
                        <p style="font-size:24px; font-weight:bold; margin:0;">${counts.emp} viajes</p>
                        <p style="margin:5px 0 0 0; font-size:14px;">Total: ${counts.dEmp.toFixed(1)} km | ${formatTime(counts.tEmpMs)}</p>
                    </div>
                `;
                document.getElementById("btn-download").style.display = "block";
            };

            return {
                initialize: function (api, state, callback) { 
                    // Pre-seleccionar la fecha de hoy
                    const today = new Date().toISOString().split('T')[0];
                    document.getElementById("date-from").value = today;
                    document.getElementById("date-to").value = today;
                    callback(); 
                },
                focus: function (api, state) {
                    document.getElementById("btn-refresh").onclick = async () => {
                        const dateFrom = document.getElementById("date-from").value;
                        const dateTo = document.getElementById("date-to").value;
                        
                        if (!dateFrom || !dateTo) return alert("Por favor, selecciona las fechas Desde y Hasta.");
                        if (new Date(dateFrom) > new Date(dateTo)) return alert("La fecha 'Desde' no puede ser posterior a 'Hasta'.");

                        const btn = document.getElementById("btn-refresh");
                        btn.innerText = "Cargando...";
                        btn.disabled = true;

                        lastData = await processData(dateFrom, dateTo);
                        render(lastData);

                        btn.innerText = "Generar Informe";
                        btn.disabled = false;
                    };

                    document.getElementById("btn-download").onclick = () => {
                        // Adaptar CSV para el nuevo formato agregado por vehículo
                        let csv = "\uFEFFVehiculo,Tot.Viajes,Viajes.Occ,Viajes.Emp,Tot.Km,Occ.Km,Emp.Km,T.Cond.Occ(ms),T.Cond.Emp(ms),T.Cond.Tot(ms),T.Parado(ms)\n" + 
                                  lastData.map(v => `${v.vehicleName},${v.totCount},${v.occCount},${v.empCount},${v.totDist.toFixed(1)},${v.occDist.toFixed(1)},${v.empDist.toFixed(1)},${v.occTimeMs},${v.empTimeMs},${v.totTimeMs},${v.stoppedTimeMs}`).join("\n");
                        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                        const link = document.createElement("a");
                        link.href = URL.createObjectURL(blob);
                        link.download = `informe_pasajeros_agregado_${document.getElementById("date-from").value}_al_${document.getElementById("date-to").value}.csv`;
                        link.click();
                    };
                },
                blur: function () {}
            };
        };
    </script>
</body>
</html>
